name: 'AOT Test'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ "master" ]

jobs:
  nativeaot-smoke:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        mode: [dynamic, source]
        include:
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: macos-15-intel
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run NativeAOT smoke test
      shell: pwsh
      run: .\TinyEXR.Test\run_nativeaot_smoke.ps1 -Mode ${{ matrix.mode }} -RuntimeIdentifier ${{ matrix.rid }}
