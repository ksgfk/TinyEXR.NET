name: 'AOT Test'

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [ "master" ]

jobs:
  nativeaot-smoke:
    strategy:
      fail-fast: false
      matrix:
        mode: [dynamic, source]
        include:
          - os: windows-latest
            rid: win-x64
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: 'true'

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Run NativeAOT smoke test
      shell: pwsh
      run: .\TinyEXR.Test\run_nativeaot_smoke.ps1 -Mode ${{ matrix.mode }} -RuntimeIdentifier ${{ matrix.rid }}
